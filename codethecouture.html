<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code the Couture</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    text-align: center;
}

/* Background glow */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,80,0,0.2), transparent);
    z-index: -1;
}

/* Button */
button {
    background: linear-gradient(45deg, orange, red);
    border: none;
    padding: 12px 25px;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

/* Hidden sections */
.hidden {
    display: none;
}

.container {
    padding: 30px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
}

.card {
    border: 1px solid orange;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Code the Couture</h1>
<p>Decode. Design. Disrupt.</p>

<button onclick="start()">Start Decode</button>

<!-- Form -->
<div id="form" class="hidden">
    <h2>Enter Details</h2>
    <input id="name" placeholder="Name"><br>
    <input id="phone" placeholder="Phone"><br>
    <button onclick="next()">Continue</button>
</div>

<!-- Category -->
<div id="category" class="hidden">
    <h2 id="catText"></h2>
    <button onclick="showPuzzle()">Solve Puzzle</button>
</div>

<!-- Puzzle -->
<div id="puzzle" class="hidden">
    <h3 id="puzzleText"></h3>
    <input id="answer" placeholder="Enter Answer">
    <br>
    <button onclick="checkAnswer()">Submit</button>
</div>

<!-- Themes -->
<div id="themes" class="hidden">
    <h2>Choose Your Theme</h2>
    <div id="themeList"></div>
</div>

</div>

<script>

let category = "";

const data = {

"AI & Future": {
    puzzle: "01000001 01001001 = ?",
    answer: "ai",
    themes: [
        "Half Code, Half Human",
        "War Against AI",
        "Bio-Hacked Human"
    ]
},

"Climate": {
    puzzle: "LAME CITED THRASH → rearrange",
    answer: "earth climate",
    themes: [
        "The Air We Wear",
        "Walking Landfill",
        "Nature Strikes Back"
    ]
},

"Energy": {
    puzzle: "I cannot be created or destroyed. What am I?",
    answer: "energy",
    themes: [
        "Solar Saviour",
        "Human Battery",
        "Power from Waste"
    ]
},

"Media": {
    puzzle: "What spreads faster than truth?",
    answer: "viral",
    themes: [
        "Clickbait Couture",
        "Filtered Life",
        "Validation Machine"
    ]
},

"Society": {
    puzzle: "What defines value but isn't visible?",
    answer: "money",
    themes: [
        "Consumerism Monster",
        "Rich vs Poor Divide",
        "People Pleaser"
    ]
}

};

function start(){
    document.getElementById("form").classList.remove("hidden");
}

function next(){
    const keys = Object.keys(data);
    category = keys[Math.floor(Math.random()*keys.length)];

    document.getElementById("form").classList.add("hidden");
    document.getElementById("category").classList.remove("hidden");

    document.getElementById("catText").innerText = "You unlocked: " + category;
}

function showPuzzle(){
    document.getElementById("category").classList.add("hidden");
    document.getElementById("puzzle").classList.remove("hidden");

    document.getElementById("puzzleText").innerText = data[category].puzzle;
}

function checkAnswer(){
    let user = document.getElementById("answer").value.toLowerCase();

    if(user.includes(data[category].answer)){
        showThemes();
    } else {
        alert("Try again ⚡");
    }
}

function showThemes(){
    document.getElementById("puzzle").classList.add("hidden");
    document.getElementById("themes").classList.remove("hidden");

    let list = document.getElementById("themeList");
    list.innerHTML = "";

    data[category].themes.forEach(t=>{
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h3>${t}</h3>
        <button onclick="selectTheme('${t}')">Select</button>`;
        list.appendChild(div);
    });
}

function selectTheme(theme){
    alert("🎉 Theme Selected: " + theme);
}

</script>

</body>
</html>
